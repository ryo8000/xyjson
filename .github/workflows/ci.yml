name: CI
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.github/workflows/**'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
    - name: Install dependencies
      run: npm ci
    - name: Run tests (Linux)
      run: xvfb-run -a npm run test:integration
      if: runner.os == 'Linux'
    - name: Run tests (non-Linux)
      run: npm run test:integration
      if: runner.os != 'Linux'
