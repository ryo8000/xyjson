name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check-changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test-needed: ${{ steps.filter.outputs.test-needed }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Check changed files
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          CHANGED=$(git diff --name-only "$BASE...$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/|scripts/|package\.json$|package-lock\.json$|tsconfig\.json$|eslint\.config\.mjs$|\.github/workflows/)'; then
            echo "test-needed=true" >> $GITHUB_OUTPUT
          else
            echo "test-needed=false" >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: check-changes
    if: needs.check-changes.outputs.test-needed == 'true'
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Run tests (non-Linux)
        if: runner.os != 'Linux'
        run: npm run test:integration

  ci-status:
    name: CI Status
    needs: [check-changes, test]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check test result
        env:
          CHECK_CHANGES: ${{ needs.check-changes.result }}
          TEST: ${{ needs.test.result }}
        shell: bash
        run: |
          if [[ "$CHECK_CHANGES" != "success" ]]; then
            echo "CI failed (check-changes=$CHECK_CHANGES)"
            exit 1
          fi
          if [[ "$TEST" == "success" || "$TEST" == "skipped" ]]; then
            echo "CI passed (test=$TEST)"
          else
            echo "CI failed (test=$TEST)"
            exit 1
          fi
