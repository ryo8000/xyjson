name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Include the conversion type (e.g. XML → JSON) and the steps to trigger the issue.
      placeholder: |
        1. Open a file containing ...
        2. Run command ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input
      description: The content you were trying to convert
      render: text

  - type: textarea
    id: expected
    attributes:
      label: Expected Output
      render: text

  - type: textarea
    id: actual
    attributes:
      label: Actual Output or Error Message
      render: text

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: e.g. 1.99.0
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
